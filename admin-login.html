<body>
<main class="login-box">
  <h2>Admin Login</h2>
  <form id="admin-login" autocomplete="off" novalidate>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">

    <button type="submit">Login</button>

    <div class="error" id="error-message" role="alert"></div>
  </form>

  <p style="text-align: center; margin-top: 1em;">
    <a href="index.html" style="text-decoration: none; color: #555;">← Back to Home</a>
  </p>
</main>

  <script>
    const loginForm = document.getElementById('admin-login');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      const correctUsername = 'AJPC';
      const correctPassword = 'AnnaJohn3251';

      if (username === correctUsername && password === correctPassword) {
        localStorage.setItem('adminLoggedIn', true);
        window.location.href = 'admin-dashboard.html';
      } else {
        errorMessage.textContent = 'Access Denied. Incorrect username or password.';
      }
    });
  </script>
</body>
