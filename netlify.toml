[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  functionsPort = 9999
  port = 8888
  autoLaunch = true
  framework = "#static"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/glossary-data.json"]
